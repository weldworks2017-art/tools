<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下穴計算機</title>
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-title" content="下穴計算機">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    color: #fff;
    font-family: -apple-system, sans-serif;
    padding: 16px;
  }

  .section-label {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 14px 0 6px;
  }
  .section-label:first-child { margin-top: 0; }

  .inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }
  .input-group label {
    display: block;
    font-size: 12px;
    color: #aaa;
    margin-bottom: 4px;
  }
  .input-group input {
    width: 100%;
    background: #222;
    border: 1px solid #444;
    border-radius: 8px;
    color: #fff;
    font-size: 20px;
    padding: 10px 12px;
    outline: none;
  }
  .input-group input:focus { border-color: #888; }
  .input-group.full { grid-column: 1 / -1; }

  .group-box {
    border: 1px solid #333;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .group-box .group-title {
    font-size: 11px;
    color: #888;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .group-box.g1 { border-color: #1e3a5f; }
  .group-box.g2 { border-color: #3a2a10; }

  #results {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .row {
    display: flex;
    align-items: center;
    padding: 10px 8px;
    font-size: 18px;
    border-radius: 4px;
  }
  .row:nth-child(odd)  { background: #1a1a1a; }
  .row:nth-child(even) { background: #222; }
  .row.done { opacity: 0.4; text-decoration: line-through; }
  .row.start {
    font-size: 22px;
    font-weight: bold;
    color: #fff;
  }
  .row.start .val { margin-left: auto; }
  .row input[type="checkbox"] {
    width: 20px;
    height: 20px;
    margin-right: 10px;
    accent-color: #4af;
    flex-shrink: 0;
    cursor: pointer;
  }
  .row .expr { color: #888; flex: 1; }
  .row .eq { color: #aaa; margin: 0 8px; }
  .row .val { font-weight: bold; color: #fff; }
  .addend-g1a { color: #4af; }
  .addend-g1b { color: #7cf; }
  .addend-g2a { color: #fa4; }
  .addend-g2b { color: #fc8; }

  /* 横画面 */
  @media (orientation: landscape) {
    body { padding: 10px; }
    .inputs-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .group-box { margin-bottom: 0; }
    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 4px 8px;
    }
    .row { padding: 6px 8px; border-radius: 6px; font-size: 15px; }
    .row.start { font-size: 17px; }
  }
</style>
</head>
<body>

<div class="inputs-wrap">
  <div class="group-box">
    <div class="group-title">開始値</div>
    <div class="inputs" style="grid-template-columns:1fr;">
      <div class="input-group">
        <label>数値1（開始）</label>
        <input type="number" id="v1" inputmode="numeric" placeholder="0">
      </div>
    </div>
  </div>

  <div class="group-box g1">
    <div class="group-title">グループ1</div>
    <div class="inputs">
      <div class="input-group">
        <label>数値2</label>
        <input type="number" id="v2" inputmode="numeric" placeholder="0">
      </div>
      <div class="input-group">
        <label>数値3（0=省略）</label>
        <input type="number" id="v3" inputmode="numeric" placeholder="0">
      </div>
      <div class="input-group full">
        <label>数値4（繰り返し回数）</label>
        <input type="number" id="v4" inputmode="numeric" placeholder="1" min="0" max="100">
      </div>
    </div>
  </div>

  <div class="group-box g2">
    <div class="group-title">グループ2</div>
    <div class="inputs">
      <div class="input-group">
        <label>数値5（0=省略）</label>
        <input type="number" id="v5" inputmode="numeric" placeholder="0">
      </div>
      <div class="input-group">
        <label>数値6（0=省略）</label>
        <input type="number" id="v6" inputmode="numeric" placeholder="0">
      </div>
      <div class="input-group full">
        <label>数値7（繰り返し回数）</label>
        <input type="number" id="v7" inputmode="numeric" placeholder="0" min="0" max="100">
      </div>
    </div>
  </div>
</div>

<div id="results"></div>

<script>
  const IDS = ['v1','v2','v3','v4','v5','v6','v7'];

  function save() {
    const data = {};
    IDS.forEach(id => data[id] = document.getElementById(id).value);
    localStorage.setItem('shitaana_v2', JSON.stringify(data));
  }

  function load() {
    try {
      const data = JSON.parse(localStorage.getItem('shitaana_v2') || '{}');
      IDS.forEach(id => { if (data[id] !== undefined) document.getElementById(id).value = data[id]; });
    } catch(e) {}
  }

  function fmt(n) { return Number(n).toLocaleString('ja-JP'); }

  function addRow(out, prev, addend, cls) {
    const cur = prev + addend;
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `
      <input type="checkbox">
      <span class="expr">${fmt(prev)} <span class="${cls}">+ ${fmt(addend)}</span></span>
      <span class="eq">=</span>
      <span class="val">${fmt(cur)}</span>
    `;
    row.querySelector('input').addEventListener('change', e => {
      row.classList.toggle('done', e.target.checked);
    });
    out.appendChild(row);
    return cur;
  }

  function calc() {
    save();
    const g = id => parseFloat(document.getElementById(id).value) || 0;
    const gi = id => Math.max(0, Math.min(100, parseInt(document.getElementById(id).value) || 0));

    const v1 = g('v1');
    const v2 = g('v2'), v3 = g('v3'), v4 = gi('v4');
    const v5 = g('v5'), v6 = g('v6'), v7 = gi('v7');

    const out = document.getElementById('results');
    out.innerHTML = '';

    let cur = v1;
    const startRow = document.createElement('div');
    startRow.className = 'row start';
    startRow.innerHTML = `<input type="checkbox"><span class="val">${fmt(cur)}</span>`;
    startRow.querySelector('input').addEventListener('change', e => {
      startRow.classList.toggle('done', e.target.checked);
    });
    out.appendChild(startRow);

    // Group 1
    for (let i = 0; i < v4; i++) {
      if (v2 !== 0) cur = addRow(out, cur, v2, 'addend-g1a');
      if (v3 !== 0) cur = addRow(out, cur, v3, 'addend-g1b');
    }

    // Group 2
    for (let i = 0; i < v7; i++) {
      if (v5 !== 0) cur = addRow(out, cur, v5, 'addend-g2a');
      if (v6 !== 0) cur = addRow(out, cur, v6, 'addend-g2b');
    }
  }

  load();
  calc();
  document.querySelectorAll('input[type=number]').forEach(el => el.addEventListener('input', calc));
</script>
</body>
</html>
